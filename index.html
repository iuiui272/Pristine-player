<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pristine Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Library</h2>
            </div>
            <nav>
                <ul>
                    <li class="active">Songs</li>
                    <li>Albums</li>
                    <li>Artists</li>
                </ul>
            </nav>
            
            <div class="sidebar-actions">
                <button id="install-button" class="btn secondary-btn" style="display: none;">Install App</button>
            </div>
        </aside>

        <main class="content">
            <header class="mobile-header">
                <h1>Songs</h1>
            </header>
            
            <div class="song-grid" id="song-grid">
                <div class="song-card">
                    <div class="art-placeholder"></div>
                    <div class="song-info">
                        <h3>Loading Library...</h3>
                        <p>Syncing with GitHub</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="player-bar">
            <div class="now-playing">
                <div class="mini-art"></div>
                <div class="track-details">
                    <span id="player-title">Not Playing</span>
                    <span id="player-artist">--</span>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn">⏮</button>
                <button class="control-btn play-btn">▶</button>
                <button class="control-btn">⏭</button>
                <audio id="audio-player" style="display: none;"></audio>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
