<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Pristine Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<body>
    <div class="app-container">
        <main class="content" id="main-content">
            <header class="mobile-header">
                <h1>Library</h1>
                <button id="profile-btn" class="icon-btn">👤</button>
            </header>
            
            <div class="song-grid" id="song-grid"></div>
        </main>

        <div id="fullscreen-player" class="fullscreen-view hidden">
            <button id="close-fullscreen">🡣</button>
            <img id="fs-cover" src="" alt="Cover Art" class="fs-art">
            <div class="fs-info">
                <h2 id="fs-title">Not Playing</h2>
                <p id="fs-artist">--</p>
            </div>
            <div class="fs-controls">
                <button class="control-btn fs-btn">⏮</button>
                <button class="control-btn play-btn fs-play">▶</button>
                <button class="control-btn fs-btn">⏭</button>
            </div>
        </div>

        <nav class="floating-menu">
            <button class="nav-item active" id="nav-library">
                <span>📚</span><label>Library</label>
            </button>
            <div class="mini-player" id="mini-player">
                <img id="mini-art" src="" alt="">
                <div class="mini-info">
                    <span id="player-title">Not Playing</span>
                </div>
                <button class="control-btn play-btn" id="mini-play">▶</button>
            </div>
            <button class="nav-item" id="nav-search">
                <span>🔍</span><label>Search</label>
            </button>
        </nav>
        
        <audio id="audio-player" style="display: none;"></audio>

        <div id="profile-modal" class="modal hidden">
            <div class="modal-content liquid-glass">
                <h2>Profile & Settings</h2>
                <input type="text" id="username-input" placeholder="Enter your name">
                <button id="save-profile" class="btn primary-btn">Save</button>
                <hr>
                <button id="clear-cache" class="btn danger-btn">🗑️ Clear All Saved Music & Data</button>
                <button id="close-profile" class="btn secondary-btn">Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
