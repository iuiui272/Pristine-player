<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <style>
        :root { --bg: #f2f2f7; --text: #000; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; }

        /* Navigation & Menu */
        .menu-btn { position: fixed; top: 20px; right: 20px; z-index: 100; font-size: 2rem; border: none; background: none; cursor: pointer; }
        #menu { 
            position: fixed; top: 0; right: 0; width: 80%; height: 100%; 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(30px);
            z-index: 50; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            padding: 60px 20px; box-sizing: border-box;
        }
        #menu.open { transform: translateX(0); }

        /* Main View */
        .hero { padding: 80px 20px; text-align: center; }
        #city-display { font-size: 3rem; margin: 0; }
        #temp-display { font-size: 5rem; font-weight: 200; }
        
        /* Search */
        #city-search { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #fff; }
        .result-item { padding: 15px; background: #fff; margin-top: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">≡</button>

    <div id="menu">
        <h2>Locations</h2>
        <input type="text" id="city-search" placeholder="Search city...">
        <div id="results"></div>
    </div>

    <main class="hero">
        <h1 id="city-display">Loading...</h1>
        <div id="temp-display">--°</div>
    </main>

    <script>
        const menu = document.getElementById('menu');
        const cityDisplay = document.getElementById('city-display');
        const tempDisplay = document.getElementById('temp-display');
        const searchInput = document.getElementById('city-search');
        const results = document.getElementById('results');

        function toggleMenu() { menu.classList.toggle('open'); }

        async function fetchWeather(name, lat, lon) {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            const data = await res.json();
            tempDisplay.innerText = data.current_weather.temperature + '°';
            cityDisplay.innerText = name;
            localStorage.setItem('lastCity', JSON.stringify({name, lat, lon}));
            toggleMenu();
        }

        searchInput.addEventListener('input', async (e) => {
            if (e.target.value.length < 2) return;
            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${e.target.value}`);
            const data = await res.json();
            results.innerHTML = '';
            if (data.results) {
                data.results.forEach(city => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerText = city.name;
                    div.onclick = () => fetchWeather(city.name, city.latitude, city.longitude);
                    results.appendChild(div);
                });
            }
        });

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('lastCity'));
            if (saved) fetchWeather(saved.name, saved.lat, saved.lon);
            else cityDisplay.innerText = "Search a City";
        };
    </script>
</body>
</html>
